<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Usuário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Atualizar um Usuário</h1>
        <p>Digite o ID do usuário e os novos dados.</p>
        
     
        <form id="form-atualizar-usuario">
      
            <input 
                type="number" 
                id="usuario-id" 
                placeholder="ID do usuário (1-10)"
                min="1"
                max="10"
                required
            />
            
          
            <input 
                type="text" 
                id="usuario-nome" 
                placeholder="Novo nome"
                required
            />
            
        
            <input 
                type="email" 
                id="usuario-email" 
                placeholder="Novo e-mail"
                required
            />
            
           
            <button type="submit">Atualizar Usuário</button>
        </form>
        
      
        <div id="resultado-usuario"></div>
    </div>

    <script src="putUsuarios.js"></script>
</body>
</html>
